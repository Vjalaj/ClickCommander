<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Mouse Cursor -->
  <g transform="translate(60, 50)">
    <path d="M 0 0 L 0 50 L 15 40 L 22 55 L 28 52 L 21 37 L 35 35 Z" 
          fill="url(#grad1)" 
          stroke="#fff" 
          stroke-width="2"
          filter="url(#glow)"/>
  </g>
  
  <!-- Command Symbol (Lightning Bolt) -->
  <g transform="translate(110, 90)">
    <path d="M 15 0 L 0 25 L 12 25 L 8 45 L 30 15 L 18 15 L 25 0 Z" 
          fill="url(#grad2)" 
          stroke="#fff" 
          stroke-width="2"
          filter="url(#glow)"/>
  </g>
  
  <!-- Circular Motion Trail -->
  <g opacity="0.4">
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="10 5"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="8 4"/>
  </g>
  
  <!-- Click Ripples -->
  <g opacity="0.3">
    <circle cx="75" cy="85" r="8" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="75" cy="85" r="12" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="135" cy="125" r="10" fill="none" stroke="#ec4899" stroke-width="2"/>
    <circle cx="135" cy="125" r="15" fill="none" stroke="#ec4899" stroke-width="1.5"/>
  </g>
</svg>
